<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Digital Magic Setup</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #000; font-family: sans-serif; user-select: none; -webkit-user-select: none; }
    #app { width: 100%; height: 100%; position: relative; }
    
    /* 步驟零：解鎖畫面（騙取 iOS 感測器權限） */
    .unlock-screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #111; z-index: 100; }
    .btn { padding: 12px 24px; font-size: 18px; border-radius: 8px; border: none; background: #fff; color: #000; cursor: pointer; font-weight: bold; margin-top: 10px; }
    .btn-danger { background: #ff4d4d; color: white; }
    .btn-primary { background: #4da6ff; color: white; width: 100%; padding: 15px; font-size: 20px;}

    /* 步驟一：設定區 */
    .setup-screen { position: absolute; inset: 0; background: #222; color: white; padding: 30px 20px; z-index: 50; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
    .setup-group { background: #333; padding: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
    .preview-img { max-width: 100px; max-height: 100px; border-radius: 5px; object-fit: cover; border: 1px solid #555; }
    input[type="range"] { width: 100%; }
    
    /* 步驟二：魔術主畫面 */
    .magic-screen { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 10; }
    
    /* 左上角秘密觸發區（連點三下回設定） */
    .hidden-trigger { position: absolute; top: 0; left: 0; width: 90px; height: 90px; z-index: 20; opacity: 0; }

    /* 魔術物件 */
    .magic-object {
      position: absolute;
      transition: opacity 0.2s ease;
      transform: translate(-50%, -50%); 
      will-change: left, top;
    }
  </style>
</head>
<body>
  <div id="app">
    <div v-if="step === 0" class="unlock-screen">
      <button class="btn" @click="requestPermissions">Tap to Start</button>
    </div>

    <div v-if="step === 1" class="setup-screen">
      <h2 style="margin: 0;">🛠️ 魔術後台設定</h2>
      
      <div class="setup-group">
        <label>1. 背景截圖 (Background)</label>
        <input type="file" @change="(e) => compressAndSave(e, 'bg')" accept="image/*">
        <img v-if="bgImage" :src="bgImage" class="preview-img">
      </div>

      <div class="setup-group">
        <label>2. 變出物件 (Coin / Card)</label>
        <input type="file" @change="(e) => compressAndSave(e, 'obj')" accept="image/*">
        <img v-if="objImage" :src="objImage" class="preview-img">
        
        <label style="margin-top: 10px;">物件大小: {{ objSize }}px</label>
        <input type="range" min="50" max="400" v-model="objSize" @change="saveSettings">
      </div>

      <div style="display: flex; gap: 10px;">
        <button class="btn btn-danger" style="flex: 1;" @click="clearMemory">清除記憶</button>
      </div>

      <button class="btn btn-primary" :disabled="!bgImage || !objImage" @click="enterMagicMode">
        {{ (!bgImage || !objImage) ? '請先上傳圖片' : '進入魔術模式' }}
      </button>
    </div>

    <div v-if="step === 2" class="magic-screen" :style="{ backgroundImage: `url(${bgImage})` }">
      <div class="hidden-trigger" @touchstart="onSecretTap"></div>

      <img 
        v-if="objImage" 
        :src="objImage" 
        class="magic-object"
        :style="{ 
          opacity: isRevealed ? 1 : 0, 
          width: objSize + 'px',
          left: objX + 'px', 
          top: objY + 'px',
          pointerEvents: isRevealed ? 'auto' : 'none'
        }"
        @touchstart="onTouchStart"
        @touchmove="onTouchMove"
        @touchend="onTouchEnd"
      />
    </div>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
      setup() {
        const step = ref(0);
        
        // 讀取 localStorage 記憶
        const bgImage = ref(localStorage.getItem('magic_bg') || '');
        const objImage = ref(localStorage.getItem('magic_obj') || '');
        const objSize = ref(parseInt(localStorage.getItem('magic_size')) || 120);
        
        const isRevealed = ref(false);
        const objX = ref(window.innerWidth / 2);
        const objY = ref(window.innerHeight / 2);
        const isDragging = ref(false);

        // 搖晃偵測參數
        let lastUpdate = 0;
        let lastX = null, lastY = null, lastZ = null;
        const SHAKE_THRESHOLD = 600; // 搖晃力道門檻，若覺得太難搖可以調低 (例如400)，太容易觸發可以調高

        // 秘密點擊參數
        let secretTapCount = 0;
        let secretTapTimer = null;

        const requestPermissions = async () => {
          if (typeof DeviceMotionEvent.requestPermission === 'function') {
            try {
              const permission = await DeviceMotionEvent.requestPermission();
              if (permission === 'granted') step.value = 1;
              else alert('需要動作感測器權限才能觸發搖晃！');
            } catch (error) { console.error(error); }
          } else {
            step.value = 1; // Android 直接進入
          }
        };

        // 圖片壓縮與儲存 (避免截圖太大塞爆 localStorage)
        const compressAndSave = (e, type) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const ctx = canvas.getContext('2d');
              // 限制最大寬度為 800px 以節省空間
              const maxWidth = 800;
              let width = img.width;
              let height = img.height;
              if (width > maxWidth) {
                height = Math.round(height * maxWidth / width);
                width = maxWidth;
              }
              canvas.width = width;
              canvas.height = height;
              ctx.drawImage(img, 0, 0, width, height);
              
              // 轉為較低畫質的 JPEG 儲存 (0.7 quality)
              const dataUrl = type === 'bg' ? canvas.toDataURL('image/jpeg', 0.8) : canvas.toDataURL('image/png'); // 物件通常需要透明背景保留PNG
              
              if (type === 'bg') bgImage.value = dataUrl;
              else objImage.value = dataUrl;
              
              saveSettings();
            };
            img.src = event.target.result;
          };
          reader.readAsDataURL(file);
        };

        const saveSettings = () => {
          try {
            localStorage.setItem('magic_bg', bgImage.value);
            localStorage.setItem('magic_obj', objImage.value);
            localStorage.setItem('magic_size', objSize.value);
          } catch (e) {
            alert('手機記憶體空間不足以儲存，請嘗試上傳較小的圖片。');
          }
        };

        const clearMemory = () => {
          bgImage.value = ''; objImage.value = '';
          localStorage.removeItem('magic_bg');
          localStorage.removeItem('magic_obj');
        };

        const enterMagicMode = () => {
          step.value = 2;
          isRevealed.value = false;
          window.addEventListener('devicemotion', handleMotion);
          window.addEventListener('deviceorientation', handleOrientation);
          
          // 嘗試進入全螢幕 (部分瀏覽器支援)
          if(document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(()=>{});
          }
        };

        // 改良版搖晃偵測
        const handleMotion = (e) => {
          if (isRevealed.value) return; // 出現了就不再偵測搖晃
          const acc = e.acceleration || e.accelerationIncludingGravity;
          if (!acc || acc.x === null) return;

          const currentTime = Date.now();
          if ((currentTime - lastUpdate) > 100) { // 每 100 毫秒取樣一次
            const diffTime = (currentTime - lastUpdate);
            lastUpdate = currentTime;

            if (lastX !== null) {
              // 計算瞬間加速度變化率
              const speed = Math.abs(acc.x + acc.y + acc.z - lastX - lastY - lastZ) / diffTime * 10000;
              if (speed > SHAKE_THRESHOLD) {
                // 搖晃成功！
                isRevealed.value = true;
                objX.value = window.innerWidth / 2;
                objY.value = window.innerHeight / 2;
                // 觸發震動回饋 (如果裝置支援)
                if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
              }
            }
            lastX = acc.x; lastY = acc.y; lastZ = acc.z;
          }
        };

        // 陀螺儀滑動
        const handleOrientation = (e) => {
          if (!isRevealed.value || isDragging.value) return;
          const speed = 1.2; // 靈敏度
          objX.value += e.gamma * speed;
          objY.value += (e.beta - 30) * speed; 
        };

        // 拖曳處理
        const onTouchStart = (e) => { isDragging.value = true; };
        const onTouchMove = (e) => {
          if (!isDragging.value) return;
          e.preventDefault(); 
          const touch = e.touches[0];
          objX.value = touch.clientX;
          objY.value = touch.clientY;
        };
        const onTouchEnd = (e) => {
          isDragging.value = false;
          // 如果滑到畫面最邊緣，視為「丟出去」
          const threshold = objSize.value / 2;
          if (objX.value < -threshold || objX.value > window.innerWidth + threshold || 
              objY.value < -threshold || objY.value > window.innerHeight + threshold) {
            isRevealed.value = false; // 隱藏物件
          }
        };

        // 秘密角落連點三下處理
        const onSecretTap = (e) => {
          e.preventDefault();
          secretTapCount++;
          if (secretTapCount === 1) {
            secretTapTimer = setTimeout(() => { secretTapCount = 0; }, 800); // 800毫秒內沒點完就重置
          }
          if (secretTapCount >= 3) {
            clearTimeout(secretTapTimer);
            secretTapCount = 0;
            isRevealed.value = false;
            // 移除感測器監聽，避免背景繼續運算
            window.removeEventListener('devicemotion', handleMotion);
            window.removeEventListener('deviceorientation', handleOrientation);
            step.value = 1; // 回到設定畫面
            
            // 退出全螢幕
            if(document.exitFullscreen) document.exitFullscreen().catch(()=>{});
          }
        };

        return {
          step, bgImage, objImage, objSize, isRevealed, objX, objY,
          requestPermissions, compressAndSave, saveSettings, clearMemory, enterMagicMode,
          onTouchStart, onTouchMove, onTouchEnd, onSecretTap
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
