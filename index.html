<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Magic Setup - Performance Optimized</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #000; font-family: sans-serif; user-select: none; -webkit-user-select: none; }
    #app { width: 100%; height: 100%; position: relative; }
    
    .unlock-screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #111; z-index: 100; }
    .btn { padding: 15px 30px; font-size: 20px; border-radius: 8px; border: none; background: #4da6ff; color: white; cursor: pointer; font-weight: bold; }
    
    .setup-screen { position: absolute; inset: 0; background: #222; color: white; padding: 30px 20px; z-index: 50; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
    .magic-screen { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 10; }
    
    /* 依然保留半透明紅色，方便你定位點擊 */
    .hidden-trigger { position: absolute; top: 0; left: 0; width: 150px; height: 150px; z-index: 20; background: rgba(255, 0, 0, 0.3); }

    .magic-object { position: absolute; transition: opacity 0.1s ease; transform: translate(-50%, -50%); will-change: left, top; }
    
    .debug-panel { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: lime; padding: 10px; font-family: monospace; z-index: 999; border-radius: 5px; pointer-events: none;}
  </style>
</head>
<body>
  <div id="app">
    <div v-if="step === 0" class="unlock-screen">
      <button class="btn" @click="requestPermissions">Tap to Start</button>
    </div>

    <div v-if="step === 1" class="setup-screen">
      <h2>效能除錯設定區</h2>
      <label>1. 上傳背景: <input type="file" @change="(e) => compressAndSave(e, 'bg')" accept="image/*"></label>
      <label>2. 上傳物件: <input type="file" @change="(e) => compressAndSave(e, 'obj')" accept="image/*"></label>
      <button class="btn" v-if="bgImage && objImage" @click="enterMagicMode">進入魔術模式</button>
    </div>

    <div v-if="step === 2" class="magic-screen" :style="{ backgroundImage: `url(${bgImage})` }">
      <div class="hidden-trigger" @pointerdown="onSecretTap"></div>

      <img v-if="objImage" :src="objImage" class="magic-object"
        :style="{ opacity: isRevealed ? 1 : 0, width: '150px', left: objX + 'px', top: objY + 'px', pointerEvents: isRevealed ? 'auto' : 'none' }"
      />

      <div class="debug-panel">
        <div>Revealed: {{ isRevealed }}</div>
        <div>Taps: {{ secretTapCount }}</div>
        <div>{{ debugSensorText }}</div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue;

    createApp({
      setup() {
        const step = ref(0);
        const bgImage = ref(localStorage.getItem('debug_bg') || '');
        const objImage = ref(localStorage.getItem('debug_obj') || '');
        const isRevealed = ref(false);
        const objX = ref(window.innerWidth / 2);
        const objY = ref(window.innerHeight / 2);
        
        const secretTapCount = ref(0);
        let secretTapTimer = null;
        const debugSensorText = ref('等待數據...');

        // 效能優化：限制 UI 更新頻率的計時器
        let lastUiUpdateTime = 0;

        const requestPermissions = async () => {
          if (typeof DeviceMotionEvent.requestPermission === 'function') {
            try {
              const permission = await DeviceMotionEvent.requestPermission();
              if (permission === 'granted') step.value = 1;
              else alert('權限被拒絕');
            } catch (error) { alert('請求權限失敗: ' + error); }
          } else {
            step.value = 1;
          }
        };

        const compressAndSave = (e, type) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (event) => {
            if (type === 'bg') { bgImage.value = event.target.result; localStorage.setItem('debug_bg', event.target.result); }
            else { objImage.value = event.target.result; localStorage.setItem('debug_obj', event.target.result); }
          };
          reader.readAsDataURL(file);
        };

        const enterMagicMode = () => {
          step.value = 2;
          isRevealed.value = false;
          secretTapCount.value = 0;
          window.addEventListener('devicemotion', handleMotion);
        };

        const handleMotion = (e) => {
          const acc = e.accelerationIncludingGravity || e.acceleration;
          if (!acc || acc.x === null) return;

          const now = Date.now();

          // 1. 邏輯判定 (背景高速計算，不影響效能)
          if (!isRevealed.value) {
            if (Math.abs(acc.x) > 15 || Math.abs(acc.y) > 15 || Math.abs(acc.z) > 15) {
              isRevealed.value = true;
              if (navigator.vibrate) navigator.vibrate([50, 50, 50]); // 震動回饋
            }
          }

          // 2. UI 畫面更新 (限制每 100 毫秒才讓 Vue 重新渲染一次文字)
          if (now - lastUiUpdateTime > 100) {
            debugSensorText.value = `X:${acc.x.toFixed(1)} Y:${acc.y.toFixed(1)} Z:${acc.z.toFixed(1)}`;
            lastUiUpdateTime = now;
          }
        };

        const onSecretTap = (e) => {
          e.preventDefault(); // 防止觸發瀏覽器預設行為
          secretTapCount.value++;
          
          if (secretTapCount.value === 1) {
            secretTapTimer = setTimeout(() => { secretTapCount.value = 0; }, 1500); 
          }
          if (secretTapCount.value >= 3) {
            clearTimeout(secretTapTimer);
            window.removeEventListener('devicemotion', handleMotion);
            step.value = 1; // 瞬間切回設定
          }
        };

        return {
          step, bgImage, objImage, isRevealed, objX, objY, secretTapCount, debugSensorText,
          requestPermissions, compressAndSave, enterMagicMode, onSecretTap
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
